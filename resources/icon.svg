<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1c1912"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(226,211,184,0.07)"/>
      <stop offset="100%" stop-color="rgba(226,211,184,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle top gloss -->
  <rect width="512" height="260" rx="112" fill="url(#gloss)"/>

  <!-- Outer gold border frame -->
  <rect x="20" y="20" width="472" height="472" rx="96"
        fill="none" stroke="#c49a2a" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Corner registration L-marks (printer's registration marks) -->
  <path d="M54,92 L54,54 L92,54"  fill="none" stroke="#c49a2a" stroke-width="2.5" stroke-opacity="0.48" stroke-linecap="square"/>
  <path d="M458,92 L458,54 L420,54" fill="none" stroke="#c49a2a" stroke-width="2.5" stroke-opacity="0.48" stroke-linecap="square"/>
  <path d="M54,420 L54,458 L92,458" fill="none" stroke="#c49a2a" stroke-width="2.5" stroke-opacity="0.48" stroke-linecap="square"/>
  <path d="M458,420 L458,458 L420,458" fill="none" stroke="#c49a2a" stroke-width="2.5" stroke-opacity="0.48" stroke-linecap="square"/>

  <!-- Top double column rule -->
  <line x1="82" y1="156" x2="430" y2="156" stroke="#c49a2a" stroke-width="2"    stroke-opacity="0.55"/>
  <line x1="82" y1="163" x2="430" y2="163" stroke="#c49a2a" stroke-width="0.75" stroke-opacity="0.26"/>

  <!-- Bottom double column rule -->
  <line x1="82" y1="349" x2="430" y2="349" stroke="#c49a2a" stroke-width="2"    stroke-opacity="0.55"/>
  <line x1="82" y1="356" x2="430" y2="356" stroke="#c49a2a" stroke-width="0.75" stroke-opacity="0.26"/>

  <!-- Italic serif letterform -->
  <text x="260" y="308"
        font-family="Baskerville, 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif"
        font-size="224"
        font-style="italic"
        font-weight="700"
        fill="#c49a2a"
        text-anchor="middle">m</text>
</svg>
